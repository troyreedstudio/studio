name: pineapple
description: "A new Flutter project."



version: 1.3.0+12
# build 4: 1.2.0+4, 7 March 2026
# build 5: 1.2.0+5, 16 April 2026 — venue search, Instagram/WhatsApp, Google Places
# build 6: 1.2.0+6, 17 April 2026 — booking WebView, ratings, curated schedule, Day Zero, gyms
# build 7: 1.2.0+7, 17 April 2026 — Plan My Night, Live Vibe Check, full sales demo build
# build 8: 1.2.0+8, 21 April 2026 — curated restaurants, profile fixes, Up late, 70 venues, vibe renames
# build 9: 1.2.0+9, 3 May 2026 — PP ratings + vibe system, refer-a-friend, distance ranking, favorites bug fix, dual rating display, interim app icon
# build 10: 1.2.0+10, 10 May 2026 — hero photo carousel, cross-category filter, Plan My Night auto-save, wishlist UI, Google Places search tap-out + attribution, branded OTP/admin emails via own Brevo, info@pinkpineapple.app sender, 75 venues with rebuilt Google Places photos
# build 11: 1.3.0+11, 19 May 2026 — VIP table booking (3-button CTA + WhatsApp deep-link to Pink Pineapple Business + attribution), Plan My Night v1.3 (cuisine + genre filters, Refine button, tonight banner on bookings), floor plan viewer, vibe check removed from venue detail, profile/onboarding/forgot-password fixes, cuisines + music genres on venue model
# build 12: 1.3.0+12, 19 May 2026 — hotfix: 3-button CTA on venue detail was gated on the wrong category string ('NIGHT_CLUB' instead of 'NIGHTLIFE') so nightclubs fell back to the legacy single 'Book a Table' button instead of showing Guest List | Buy Tickets | Book VIP Table

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  flutter_easyloading: ^3.0.5
  flutter_screenutil: ^5.9.3
  font_awesome_flutter: ^10.12.0
  get: ^4.6.6
  google_fonts: ^6.2.1
  http: ^1.2.2
  shared_preferences: ^2.3.3
  fluttertoast: ^8.2.8
  internet_connection_checker: ^1.0.0+1
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  file_picker: ^10.2.0
  google_nav_bar: ^5.0.7
  lottie: ^3.3.2
  change_app_package_name: ^1.5.0
  intl: ^0.20.2
  loading_animation_widget: ^1.3.0
  pin_code_fields: ^8.0.1
  logger: ^2.6.2
  flutter_svg: ^2.2.1
  carousel_slider: ^5.1.1
  flutter_launcher_icons: ^0.14.4
  web_socket_channel: ^3.0.3
  upgrader: ^12.5.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.13.1
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#000000"
    theme_color: "#000000"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/animation/
    - assets/jsons/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
